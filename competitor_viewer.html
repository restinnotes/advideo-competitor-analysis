        function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        function init() {
            const tabs = document.getElementById('tabs');
            const container = document.getElementById('container');
            const videoIds = Object.keys(results);
            if (!videoIds.length) { container.innerHTML = '<div class="no-video">暂无分析结果</div>'; return; }
            videoIds.forEach((id, idx) => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (idx === 0 ? ' active' : '');
                tab.textContent = id;
                tab.onclick = () => showVideo(id, tab);
                tabs.appendChild(tab);
            });
            showVideo(videoIds[0], tabs.firstChild);
        }

        function showVideo(videoId, tabEl) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            const data = results[videoId];
            const container = document.getElementById('container');
            if (!data) { container.innerHTML = '<div class="no-video">无数据</div>'; return; }

            const globalAnalysis = data.global_analysis || {};
            const videoRecord = globalAnalysis.video_record || {};
            const moduleRecords = globalAnalysis.module_records || [];
            const mentions = globalAnalysis.raw_element_mentions || [];
            const frameRequests = globalAnalysis.frame_requests || [];
            const patterns = globalAnalysis.transfer_pattern_records || [];
            const ingestionStatus = globalAnalysis.ingestion_status || {};
            const warnings = ingestionStatus.warnings || [];
            const extractionWarnings = ingestionStatus.extraction_warnings || [];
            const finalResult = data.final_result || {};

            let html = '';

            // 状态和摘要
            html += '<div class="section"><h2>分析状态</h2>';
            html += '<div class="meta-grid">';
            html += '<div class="meta-item"><div class="label">状态</div><div class="value"><span class="status-badge ' + (finalResult.status === 'pass' ? 'status-pass' : 'status-fail') + '">' + escHtml(finalResult.status || '-') + '</span></div></div>';
            html += '<div class="meta-item"><div class="label">视频ID</div><div class="value">' + escHtml(videoId) + '</div></div>';
            html += '<div class="meta-item"><div class="label">时长</div><div class="value">' + (videoRecord.duration_sec || 0).toFixed(1) + 's</div></div>';
            html += '<div class="meta-item"><div class="label">模块数</div><div class="value">' + (finalResult.module_count || moduleRecords.length) + '</div></div>';
            html += '<div class="meta-item"><div class="label">元素提及</div><div class="value">' + (finalResult.raw_element_mention_count || mentions.length) + '</div></div>';
            html += '<div class="meta-item"><div class="label">关键帧</div><div class="value">' + (finalResult.frames_extracted || 0) + '</div></div>';
            html += '<div class="meta-item"><div class="label">可迁移模式</div><div class="value">' + (finalResult.transfer_pattern_count || patterns.length) + '</div></div>';
            html += '<div class="meta-item"><div class="label">包含视觉手法</div><div class="value">' + (finalResult.has_visual_tactic ? '✓' : '✗') + '</div></div>';
            html += '</div>';

            // 警告信息
            const allWarnings = [...warnings, ...extractionWarnings];
            if (allWarnings.length) {
                html += '<h3>警告信息</h3><ul class="warning-list">';
                allWarnings.forEach(w => { html += '<li>' + escHtml(w) + '</li>'; });
                html += '</ul>';
            }
            html += '</div>';

            // 视频信息
            html += '<div class="section"><h2>视频信息</h2>';
            html += '<div class="meta-grid">';
            html += '<div class="meta-item"><div class="label">品牌/产品</div><div class="value">' + escHtml(videoRecord.observed_brand_or_product_text || '-') + '</div></div>';
            html += '<div class="meta-item"><div class="label">产品类别</div><div class="value">' + escHtml(videoRecord.product_category || '-') + '</div></div>';
            html += '<div class="meta-item"><div class="label">主要产品</div><div class="value">' + escHtml(videoRecord.main_product || '-') + '</div></div>';
            html += '<div class="meta-item"><div class="label">语言</div><div class="value">' + escHtml(videoRecord.language || '-') + '</div></div>';
            html += '<div class="meta-item"><div class="label">目标受众</div><div class="value">' + escHtml((videoRecord.target_audience || []).join(', ') || '-') + '</div></div>';
            html += '<div class="meta-item"><div class="label">主要优惠</div><div class="value">' + escHtml(videoRecord.main_offer || '-') + '</div></div>';
            html += '</div>';

            if (videoRecord.overall_strategy_summary) {
                html += '<div class="summary-box"><p><span class="label">策略总结: </span>' + escHtml(videoRecord.overall_strategy_summary) + '</p></div>';
            }
            if (videoRecord.strategy_pattern) {
                html += '<div class="summary-box"><p><span class="label">策略模式: </span>' + escHtml(videoRecord.strategy_pattern) + '</p></div>';
            }
            html += '</div>';

            // 创意模块
            if (moduleRecords.length) {
                html += '<div class="section"><h2>创意模块 (' + moduleRecords.length + ' 个)</h2><div class="module-grid">';
                moduleRecords.forEach(m => {
                    html += '<div class="module-card">';
                    html += '<h4>' + escHtml(m.module_name_cn || m.module_name || m.module_id) + '</h4>';
                    html += '<p><b>角色:</b> <span class="tag role">' + escHtml(m.module_role || '-') + '</span></p>';
                    html += '<p><b>发生了什么:</b> ' + escHtml(m.what_happens || '-') + '</p>';
                    html += '<p><b>为什么重要:</b> ' + escHtml(m.why_it_matters || '-') + '</p>';
                    if (m.key_text_or_speech && m.key_text_or_speech.length) {
                        html += '<p><b>关键文本/语音:</b> ' + escHtml(m.key_text_or_speech.join(' | ')) + '</p>';
                    }
                    if (m.visual_tactics_summary && m.visual_tactics_summary.length) {
                        html += '<p><b>视觉手法:</b> ' + m.visual_tactics_summary.map(t => '<span class="tag evidence">' + escHtml(t) + '</span>').join('') + '</p>';
                    }
                    html += '</div>';
                });
                html += '</div></div>';
            }

            // 原始元素提及
            if (mentions.length) {
                html += '<div class="section"><h2>原始元素提及 (' + mentions.length + ' 个)</h2><div class="mention-grid">';
                mentions.forEach(m => {
                    html += '<div class="mention-card">';
                    html += '<h5>' + escHtml(m.tentative_name_cn || m.tentative_name || m.mention_id) + '</h5>';
                    html += '<p><span class="type">' + escHtml(m.element_type || '-') + '</span></p>';
                    html += '<p><b>描述:</b> ' + escHtml(m.raw_description || '-') + '</p>';
                    html += '<p><b>证据来源:</b> ' + escHtml(m.evidence_source || '-') + '</p>';
                    html += '<p><b>证据强度:</b> ' + escHtml(m.evidence_strength || '-') + '</p>';
                    html += '<p><b>在模块中的角色:</b> ' + escHtml(m.role_in_module || '-') + '</p>';
                    if (m.notes) html += '<p><b>备注:</b> ' + escHtml(m.notes) + '</p>';
                    html += '</div>';
                });
                html += '</div></div>';
            }

            // 关键帧
            if (frameRequests.length) {
                html += '<div class="section"><h2>关键帧请求 (' + frameRequests.length + ' 个)</h2><div class="frame-grid">';
                frameRequests.forEach(f => {
                    html += '<div class="frame-card">';
                    html += '<img src="' + escHtml(videoId + '/' + f.image_path || '') + '" alt="' + escHtml(f.frame_request_id) + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22><rect fill=%22%23f0f0f0%22 width=%22280%22 height=%22180%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>无图片</text></svg>\'">';
                    html += '<div class="frame-info">';
                    html += '<h4>' + escHtml(f.frame_request_id) + '</h4>';
                    html += '<p><span class="role">' + escHtml(f.frame_role || '-') + '</span> | ' + (f.timestamp_sec || 0).toFixed(1) + 's</p>';
                    html += '<p><b>捕捉内容:</b> ' + escHtml(f.what_to_capture || '-') + '</p>';
                    html += '<p><b>视觉手法:</b> ' + escHtml(f.visual_tactic || '-') + '</p>';
                    html += '<p><b>为什么选择:</b> ' + escHtml(f.why_this_frame || '-') + '</p>';
                    html += '</div></div>';
                });
                html += '</div></div>';
            }

            // 可迁移模式
            if (patterns.length) {
                html += '<div class="section"><h2>可迁移模式 (' + patterns.length + ' 个)</h2><div class="pattern-grid">';
                patterns.forEach(p => {
                    html += '<div class="pattern-card">';
                    html += '<h4>' + escHtml(p.pattern_name_cn || p.pattern_name || p.pattern_id) + '</h4>';
                    html += '<span class="transferability ' + escHtml(p.transferability || 'medium') + '">' + escHtml(p.transferability || '-') + '</span>';
                    html += '<p><b>类型:</b> ' + escHtml(p.pattern_type || '-') + '</p>';
                    html += '<p><b>描述:</b> ' + escHtml(p.description || '-') + '</p>';
                    html += '<p><b>如何适配:</b> ' + escHtml(p.how_to_adapt_for_own_brand || '-') + '</p>';
                    if (p.non_transferable_parts && p.non_transferable_parts.length) {
                        html += '<p><b>不可迁移部分:</b> ' + escHtml(p.non_transferable_parts.join(', ')) + '</p>';
                    }
                    html += '</div>';
                });
                html += '</div></div>';
            }

            // 原始 JSON
            html += '<div class="section"><h2>原始 JSON</h2>';
            html += '<div style="background:#f8f8f8;padding:15px;border-radius:8px;max-height:400px;overflow:auto"><pre style="font-size:11px;line-height:1.5;white-space:pre-wrap">' + escHtml(JSON.stringify(globalAnalysis, null, 2)) + '</pre></div></div>';

            container.innerHTML = html;
        }

        init();
    </script>
